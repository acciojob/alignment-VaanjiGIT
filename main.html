<!DOCTYPE html>
<html>
<head>
<title>HTML Assignment 3</title>

<style>
/* Table Styling */
.middle {
    border: 1px solid black;
    border-spacing: 1px;
}

td, th {
    border: 1px solid black;
    padding: 1px;
}

/* Alignment classes */
.center {
    text-align: center;
}

.right {
    text-align: right;
}

/* Background color classes */
.green {

}

.blue {

</head>
